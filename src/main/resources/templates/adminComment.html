<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>صفحه مدیریت نظرات</title>
</head>

<body>

<nav style="direction: ltr" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top p-4">
    <div class="container px-4">
        <a class="navbar-brand vazirBoldFont fs-4" href="http://localhost:8080/admin">
            پنل مدیریت کتابستان
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navbarSupportedContent" class="navbar-collapse pt-4 mt-2 m-lg-0 p-lg-0 collapse rounded bg-dark">
            <ul style="font-size: larger" class="navbar-nav ms-lg-auto mb-2 mb-lg-0 align-items-center text-center">
                <li class="nav-item m-1">
                    <a class="nav-link" href="http://localhost:8080/book-list">کتاب ها</a>
                </li>
                <li class="nav-item m-1">
                    <a class="nav-link active" aria-current="page" href="http://localhost:8080">بازگشت به سایت</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container panel-header">
    <div class="row align-items-center">
        <div class="col-12 col-md-9">
            <h1 class="vazirBoldFont">مدیریت نظرات</h1>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="table-card">
        <div style="min-height: 150px" class="table-responsive">
            <table class="table align-middle text-center table-hover">
                <thead>
                <tr>
                    <th>نام کاربری</th>
                    <th>نام کتاب</th>
                    <th>متن</th>
                    <th>امتیاز</th>
                    <th>
                        <div class="dropdown-center">
                            <a style="text-decoration: none; direction: ltr" class="dropdown-toggle" type="button"
                               data-bs-toggle="dropdown" aria-expanded="false">
                                پذیرفته
                            </a>
                            <ul class="dropdown-menu text-center">
                                <li><a href="#" onclick="activateDropdownItem(this); return false;" class="dropdown-item active">همه</a></li>
                                <li><a href="#" onclick="activateDropdownItem(this); return false;" class="dropdown-item">پذیرفته شده</a></li>
                                <li><a href="#" onclick="activateDropdownItem(this); return false;" class="dropdown-item">پذیرفته نشده</a></li>
                            </ul>
                        </div>
                    </th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="py-4 bg-dark">
    <div class="container">
        <p class="m-0 text-center text-white">
            کتابفروشی برتر - تمام حقوق محفوظ است ©
        </p>
    </div>
</footer>

<script>
    function activateDropdownItem(element) {
        const menu = element.closest(".dropdown-menu");
        menu.querySelectorAll(".dropdown-item").forEach(item => item.classList.remove("active"));
        element.classList.add("active");
        loadComments();
    }

    function getActiveFilter() {
        const activeItem = document.querySelector(".dropdown-item.active");
        return activeItem ? activeItem.innerText : "همه";
    }

    async function loadComments() {
        document.getElementById("table-body").innerHTML = "";
        const res = await fetch("http://localhost:8080/comments/sorted");
        let comments = await res.json();
        const filter = getActiveFilter();
        if (filter === "پذیرفته شده") {
            comments = comments.filter(c => c.accepted);
        } else if (filter === "پذیرفته نشده") {
            comments = comments.filter(c => !c.accepted);
        }
        for (let comment of comments) {
            await convertToHTML(comment);
        }
    }

    async function getUsername(userId) {
        const res = await fetch("http://localhost:8080/users/" + userId);
        const user = await res.json();
        return user.username;
    }

    async function getBookTitle(bookId) {
        const res = await fetch("http://localhost:8080/books/" + bookId);
        const book = await res.json();
        return book.title;
    }

    function loadStars(rating) {
        let stars = "";
        for (let i = 5; i >= 1; i--) {
            stars += i <= rating ? "<span class='fa fa-star checked'></span>" : "<span class='fa fa-star'></span>";
        }
        return stars;
    }

    async function convertToHTML(comment) {
        const username = await getUsername(comment.userId);
        const bookTitle = await getBookTitle(comment.bookId);
        const tr = document.createElement("tr");
        if (!comment.accepted) tr.classList.add("table-danger");
        tr.innerHTML = `
            <td class="p-4"><a style="text-decoration: none" href="http://localhost:8080/admin/users?activeId=${comment.userId}">${username}</a></td>
            <td><a style="text-decoration: none" href="http://localhost:8080/admin/books?activeId=${comment.bookId}">${bookTitle}</a></td>
            <td style="max-width: 300px">${comment.text}</td>
            <td>${loadStars(comment.rating)}</td>
            <td>${comment.accepted ? "بله" : "خیر"}</td>
            <td>
                <button class="btn btn-sm btn-outline-success btn-accept-comment-${comment.accepted}" onclick="acceptComment(${comment.id})">
                    <i class="fa fa-check"></i>
                    پذیرفتن
                </button>
                <button onclick="deleteComment(${comment.id})" class="btn btn-sm btn-outline-danger">
                    <i class="fa fa-trash"></i>
                    حذف
                </button>
            </td>
        `;
        document.getElementById("table-body").appendChild(tr);
        document.querySelectorAll(".btn-accept-comment-true").forEach(btn => btn.remove());
    }

    function deleteComment(commentId) {
        if (confirm("حذف نظر؟")) {
            fetch("http://localhost:8080/comments/delete/" + commentId)
                .then(() => loadComments());
        }
    }

    function acceptComment(commentId) {
        fetch("http://localhost:8080/comments/accept/" + commentId)
            .then(() => loadComments());
    }

    loadComments();
</script>

<script src="/bootstrap.bundle.min.js"></script>
</body>
</html>
