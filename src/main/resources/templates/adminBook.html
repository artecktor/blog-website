<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>صفحه مدیریت کتاب ها</title>
</head>

<body>

<nav style="direction: ltr" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top p-4">
    <div class="container px-4">
        <a class="navbar-brand vazirBoldFont fs-4" href="http://localhost:8080/admin">
            پنل مدیریت کتابستان
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navbarSupportedContent" class="navbar-collapse pt-4 mt-2 m-lg-0 p-lg-0 collapse rounded bg-dark">
            <ul style="font-size: larger" class="navbar-nav ms-lg-auto mb-2 mb-lg-0 align-items-center text-center">
                <li class="nav-item m-1">
                    <a class="nav-link" href="http://localhost:8080/book-list">کتاب ها</a>
                </li>
                <li class="nav-item m-1">
                    <a class="nav-link active" aria-current="page" href="http://localhost:8080">بازگشت به سایت</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container panel-header">
    <div class="row align-items-center">
        <div class="col-12 col-md-9">
            <h1 class="vazirBoldFont">مدیریت کتاب‌ها</h1>
        </div>
        <div class="col-12 col-md-3 text-md-start text-end">
            <a href="http://localhost:8080/admin/book/save" class="btn cart-btn-2 w-100 w-md-auto">
                <i class="fa fa-plus"></i>
                افزودن کتاب جدید
            </a>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="table-card">
        <div class="table-responsive">
            <table class="table align-middle text-center table-hover">
                <thead>
                <tr>
                    <th>تصویر</th>
                    <th>نام کتاب</th>
                    <th>نویسنده</th>
                    <th>قیمت</th>
                    <th>عملیات</th>
                </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="py-4 bg-dark">
    <div class="container">
        <p class="m-0 text-center text-white">
            کتابفروشی برتر - تمام حقوق محفوظ است ©
        </p>
    </div>
</footer>

<script>
    const params = new URLSearchParams(window.location.search);
    const activeBookId = params.get("activeId");

    function loadProducts() {
        document.getElementById("table-body").innerHTML = "";
        fetch("http://localhost:8080/books")
            .then(res => res.json())
            .then(books => {
                for (let i = 0; i < books.length; i++) {
                    convertToHTML(books[i]);
                }
                document.getElementById(`tr-book-${activeBookId}`).classList.add("table-active");
            });
    }

    function convertToHTML(book) {
        let row = `<tr id="tr-book-${book.id}">
            <td>
                <img src="${book.imageAddress}"
                     style="width: 60px; height: 90px; object-fit: cover; border-radius: 5px;">
            </td>
            <td>${book.title}</td>
            <td>${book.author}</td>
            <td><span dir="ltr">${book.price.toLocaleString("fa-IR")}</span><span> تومان</span></td>
            <td>
                <a href="http://localhost:8080/admin/book/update?id=${book.id}" class="btn btn-sm btn-outline-primary">
                    <i class="fa fa-edit"></i>
                    ویرایش
                </a>
                <button onclick="deleteBook(${book.id}, '${book.title}')" class="btn btn-sm btn-outline-danger">
                    <i class="fa fa-trash"></i>
                    حذف
                </button>
            </td>
        </tr>`;
        document.getElementById("table-body").innerHTML += row;
    }

    function deleteBook(bookId, title) {
        if (confirm("حذف کتاب «" + title + "» ؟")) {
            fetch("http://localhost:8080/books/delete/" + bookId)
                .then(() => loadProducts());
        }
    }

    loadProducts();
</script>

<script src="/bootstrap.bundle.min.js"></script>
</body>
</html>
