<!DOCTYPE html>
<html lang="fa" dir="rtl"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام — درنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700&family=Vazirmatn:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/login-style.css">
</head>
<body>

<div class="page-loader" id="page-loader">
    <div class="page-loader-mark">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
    </div>
</div>

<div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
</div>

<main class="auth-wrap">

    <a href="http://localhost:8080" class="auth-logo">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
        درنگ
    </a>

    <div class="auth-card">

        <div class="auth-head">
            <h1 class="auth-title">به درنگ بپیوندید</h1>
            <p class="auth-sub">یک حساب بسازید تا بتوانید بنویسید و دیدگاه بگذارید.</p>
        </div>

        <form class="auth-form" id="register-form" action="http://localhost:8080/users" method="post">

            <div class="form-field floating">
                <input id="register-email" name="email" type="email" placeholder=" " dir="ltr" required>
                <label for="register-email">ایمیل</label>
            </div>

            <div class="form-field floating">
                <input id="register-username" name="username" type="text" placeholder=" " required>
                <label for="register-username">نام کاربری</label>
            </div>

            <div class="form-field">
                <div class="password-field floating">
                    <input id="register-password" name="password" type="password" placeholder=" " required>
                    <label for="register-password">رمز عبور</label>
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="نمایش رمز عبور">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M2 12 C4.5 6.5 8 4 12 4 C16 4 19.5 6.5 22 12 C19.5 17.5 16 20 12 20 C8 20 4.5 17.5 2 12 Z"/>
                            <circle cx="12" cy="12" r="3.2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-field">
                <div class="password-field floating">
                    <input id="register-password2" name="" type="password" placeholder=" " required>
                    <label for="register-password2">تکرار رمز عبور</label>
                    <button type="button" class="toggle-password" id="toggle-password2" aria-label="نمایش رمز عبور">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M2 12 C4.5 6.5 8 4 12 4 C16 4 19.5 6.5 22 12 C19.5 17.5 16 20 12 20 C8 20 4.5 17.5 2 12 Z"/>
                            <circle cx="12" cy="12" r="3.2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-field floating">
                <input id="register-address" name="address" type="text" placeholder=" " required>
                <label for="register-address">آدرس</label>
            </div>

            <button class="btn-auth-primary" type="submit">ثبت‌نام</button>

            <div class="divider"><span>یا ادامه با</span></div>

            <div class="oauth-row">
                <button type="button" class="btn-oauth" title="ثبت‌نام با گوگل">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="#EA4335"
                              d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.9 1.5l2.6-2.5C16.9 3.3 14.7 2.3 12 2.3 6.9 2.3 2.8 6.4 2.8 11.6 S6.9 21 12 21c6.9 0 9.6-4.9 9.6-7.4 0-.5-.05-.9-.13-1.3H12Z"/>
                    </svg>
                    گوگل
                </button>
                <button type="button" class="btn-oauth" title="ثبت‌نام با گیت‌هاب">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--ink)">
                        <path d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.3 6.8 9.6.5.1.7-.2.7-.5v-1.9c-2.8.6-3.4-1.4-3.4-1.4-.5-1.1-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.7.3-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.4.1-2.9 0 0 .8-.3 2.7 1 .8-.2 1.6-.3 2.5-.3s1.7.1 2.5.3c1.9-1.3 2.7-1 2.7-1 .5 1.5.2 2.6.1 2.9.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.6 5 .3.3.6.9.6 1.8v2.6c0 .3.2.6.7.5 3.9-1.3 6.8-5.1 6.8-9.6C22 6.6 17.5 2 12 2Z"/>
                    </svg>
                    گیت‌هاب
                </button>
            </div>
        </form>

        <p class="auth-switch">حساب دارید؟ <a href="http://localhost:8080/login">وارد شوید</a></p>

    </div>

</main>

<div class="glass-overlay" id="glass-alert-overlay">
    <div class="glass-alert" role="alertdialog" aria-modal="true" aria-labelledby="glass-alert-title">
        <button class="glass-alert-close" type="button" id="glass-alert-close" aria-label="بستن">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M5 5 L19 19 M19 5 L5 19"/>
            </svg>
        </button>
        <h3 class="glass-alert-title" id="glass-alert-title">عنوان</h3>
        <p class="glass-alert-text" id="glass-alert-text">متن پیام اینجا قرار می‌گیرد.</p>
        <button class="btn-auth-primary glass-alert-ok" type="button" id="glass-alert-ok">متوجه شدم</button>
    </div>
</div>

<script th:inline="javascript">

    window.addEventListener("load", () => {
        const loader = document.getElementById("page-loader");

        const revealRegisterError = () => {
            if (registerError !== null && registerError.trim() !== "") {
                showGlassAlert("ثبت‌نام ناموفق", registerError);
            }
        };

        const revealForm = () => {
            const fields = document.querySelectorAll(
                ".form-field, .checkbox-row, .btn-auth-primary, .divider, .oauth-row, .auth-switch"
            );
            fields.forEach((el, i) => {
                el.style.animationDelay = `${i * 60}ms`;
            });
            document.querySelector(".auth-card").parentElement.classList.add("form-ready");
        };

        if (loader) {
            setTimeout(() => {
                loader.classList.add("is-hidden");
                revealForm();
                setTimeout(revealRegisterError, 500);
            }, 500);
        } else {
            revealForm();
            revealRegisterError();
        }
    });

    function autoDirection(input) {
        input.addEventListener("input", function () {
            const value = this.value.trim();

            // Persian/Arabic Unicode range
            const persianRegex = /^[\u0600-\u06FF]/;

            if (persianRegex.test(value)) {
                this.dir = "rtl";
                this.style.textAlign = "right";
            } else {
                this.dir = "ltr";
                this.style.textAlign = "left";
            }
        });
    }

    // Apply to all text-like inputs
    document.querySelectorAll(
        'input[type="text"], input[type="email"], input[type="password"]'
    ).forEach(autoDirection);

    // Password toggles
    document.getElementById("toggle-password")
        .addEventListener("click", function () {
            const input = document.getElementById("register-password");
            const isHidden = input.type === "password";

            input.type = isHidden ? "text" : "password";

            this.setAttribute(
                "aria-label",
                isHidden ? "پنهان کردن رمز عبور" : "نمایش رمز عبور"
            );

            this.classList.toggle("is-visible", isHidden);
        });

    document.getElementById("toggle-password2")
        .addEventListener("click", function () {
            const input = document.getElementById("register-password2");
            const isHidden = input.type === "password";

            input.type = isHidden ? "text" : "password";

            this.setAttribute(
                "aria-label",
                isHidden ? "پنهان کردن رمز عبور" : "نمایش رمز عبور"
            );

            this.classList.toggle("is-visible", isHidden);
        });

    const password = document.getElementById("register-password");
    const repeat = document.getElementById("register-password2");

    function validatePasswords() {

        if (repeat.value.trim() === "") {
            repeat.classList.remove("valid", "invalid");
            return;
        }

        if (password.value === repeat.value) {
            repeat.classList.add("valid");
            repeat.classList.remove("invalid");
        } else {
            repeat.classList.add("invalid");
            repeat.classList.remove("valid");
        }
    }

    // Check while typing in either field
    password.addEventListener("input", validatePasswords);
    repeat.addEventListener("input", validatePasswords);

    // ---------------- Live duplicate-email check (border color) ----------------
    const emailInput = document.getElementById("register-email");
    let emailCheckTimer = null;

    async function isEmailTaken(email) {
        const res = await fetch("http://localhost:8080/users");
        if (!res.ok) throw new Error("failed to fetch users");
        const users = await res.json();
        return users.some(u => u.email.toLowerCase() === email.toLowerCase());
    }

    async function validateEmail() {
        const email = emailInput.value.trim();

        if (email === "" || !emailInput.checkValidity()) {
            emailInput.classList.remove("valid", "invalid");
            return;
        }

        try {
            const emailTaken = await isEmailTaken(email);

            if (emailTaken) {
                emailInput.classList.add("invalid");
                emailInput.classList.remove("valid");
            } else {
                emailInput.classList.add("valid");
                emailInput.classList.remove("invalid");
            }
        } catch (err) {
            // network hiccup — don't mislead the user with a false valid/invalid state
            emailInput.classList.remove("valid", "invalid");
        }
    }

    emailInput.addEventListener("input", () => {
        clearTimeout(emailCheckTimer);
        emailInput.classList.remove("valid", "invalid"); // clear stale state while typing
        emailCheckTimer = setTimeout(validateEmail, 400); // debounce so we don't hit the server every keystroke
    });
    // ---------------- end live duplicate-email check ----------------

    function showGlassAlert(title, text) {
        const overlay = document.getElementById("glass-alert-overlay");

        document.getElementById("glass-alert-title").innerText = title;
        document.getElementById("glass-alert-text").innerText = text;

        overlay.classList.remove("is-open");
        void overlay.offsetWidth; // force a reflow so the browser "sees" the closed state

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                overlay.classList.add("is-open");
            });
        });

        document.body.style.overflow = "hidden";
    }

    function hideGlassAlert() {
        document.getElementById("glass-alert-overlay")
            .classList.remove("is-open");

        document.body.style.overflow = "";
    }

    document.getElementById("glass-alert-close")
        .addEventListener("click", hideGlassAlert);

    document.getElementById("glass-alert-ok")
        .addEventListener("click", hideGlassAlert);

    document.getElementById("glass-alert-overlay")
        .addEventListener("click", (e) => {
            if (e.target.id === "glass-alert-overlay") {
                hideGlassAlert();
            }
        });

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            hideGlassAlert();
        }
    });

    /* Registration error from backend */
    let registerError = /*[[${registerError}]]*/ null;

    if (registerError !== null && registerError.trim() !== "") {
        showGlassAlert(
            "ثبت‌نام ناموفق",
            registerError
        );
    }

    document.getElementById("register-form")
        .addEventListener("submit", async function (event) {

            event.preventDefault(); // always intercept first, then decide whether to actually submit

            const form = event.target;

            const email =
                document.getElementById("register-email").value.trim();

            const password =
                document.getElementById("register-password").value.trim();

            const repeatPassword =
                document.getElementById("register-password2").value.trim();

            // Empty check (optional because required already exists)
            if (!password || !repeatPassword) {
                showGlassAlert(
                    "فیلدهای ناقص",
                    "لطفاً هر دو فیلد رمز عبور را پر کنید."
                );
                return;
            }

            // Password match check
            if (password !== repeatPassword) {
                showGlassAlert(
                    "عدم تطابق رمز عبور",
                    "رمز عبور و تکرار رمز عبور باید یکسان باشند."
                );

                document.getElementById("register-password2").value = "";
                document.getElementById("register-password2").focus();
                return;
            }

            // Duplicate email check (final guard before actually submitting)
            const submitBtn = form.querySelector(".btn-auth-primary");
            submitBtn.disabled = true;

            try {
                const emailTaken = await isEmailTaken(email);

                if (emailTaken) {
                    showGlassAlert(
                        "ایمیل تکراری",
                        "این ایمیل قبلاً ثبت شده است. لطفاً وارد شوید یا از ایمیل دیگری استفاده کنید."
                    );
                    emailInput.classList.add("invalid");
                    emailInput.classList.remove("valid");
                    submitBtn.disabled = false;
                    return;
                }

                form.submit(); // all checks passed, submit for real
            } catch (err) {
                showGlassAlert(
                    "خطا",
                    "بررسی ایمیل با مشکل مواجه شد. لطفاً دوباره تلاش کنید."
                );
                submitBtn.disabled = false;
            }
        });

</script>
</body>
</html>
