<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود — درنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700&family=Vazirmatn:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login-style.css">
</head>
<body>

<div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
</div>

<main class="auth-wrap">

    <a href="http://localhost:8080" class="auth-logo">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
        درنگ
    </a>

    <div class="auth-card">

        <div class="auth-head">
            <h1 class="auth-title">خوش آمدید</h1>
            <p class="auth-sub">برای ادامه‌ی خواندن و نوشتن، وارد حساب خود شوید.</p>
        </div>

        <form class="auth-form" id="login-form" action="http://localhost:8080/users" method="post">

            <div class="form-field floating">
                <input id="login-email" name="email" type="email" placeholder=" " dir="ltr" required>
                <label for="login-email">ایمیل</label>
            </div>

            <div class="form-field floating">
                <input id="login-username" name="username" type="text" placeholder=" " required>
                <label for="login-username">نام کاربری</label>
            </div>

            <div class="form-field">
                <div class="password-field floating">
                    <input id="login-password" name="password" type="password" placeholder=" " required>
                    <label for="login-password">رمز عبور</label>
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="نمایش رمز عبور">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M2 12 C4.5 6.5 8 4 12 4 C16 4 19.5 6.5 22 12 C19.5 17.5 16 20 12 20 C8 20 4.5 17.5 2 12 Z"/>
                            <circle cx="12" cy="12" r="3.2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-field">
                <div class="password-field floating">
                    <input id="login-password2" name="password" type="password" placeholder=" " required>
                    <label for="login-password2">تکرار رمز عبور</label>
                    <button type="button" class="toggle-password" id="toggle-password2" aria-label="نمایش رمز عبور">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M2 12 C4.5 6.5 8 4 12 4 C16 4 19.5 6.5 22 12 C19.5 17.5 16 20 12 20 C8 20 4.5 17.5 2 12 Z"/>
                            <circle cx="12" cy="12" r="3.2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-field floating">
                <input id="login-address" name="address" type="text" placeholder=" " required>
                <label for="login-address">آدرس</label>
            </div>

            <button class="btn-auth-primary" type="submit">ثبت نام</button>

            <div class="divider"><span>یا ادامه با</span></div>

            <div class="oauth-row">
                <button type="button" class="btn-oauth" title="ورود با گوگل">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.9 1.5l2.6-2.5C16.9 3.3 14.7 2.3 12 2.3 6.9 2.3 2.8 6.4 2.8 11.6 S6.9 21 12 21c6.9 0 9.6-4.9 9.6-7.4 0-.5-.05-.9-.13-1.3H12Z"/>
                    </svg>
                    گوگل
                </button>
                <button type="button" class="btn-oauth" title="ورود با گیت‌هاب">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--ink)">
                        <path d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.3 6.8 9.6.5.1.7-.2.7-.5v-1.9c-2.8.6-3.4-1.4-3.4-1.4-.5-1.1-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.7.3-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.4.1-2.9 0 0 .8-.3 2.7 1 .8-.2 1.6-.3 2.5-.3s1.7.1 2.5.3c1.9-1.3 2.7-1 2.7-1 .5 1.5.2 2.6.1 2.9.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.6 5 .3.3.6.9.6 1.8v2.6c0 .3.2.6.7.5 3.9-1.3 6.8-5.1 6.8-9.6C22 6.6 17.5 2 12 2Z"/>
                    </svg>
                    گیت‌هاب
                </button>
            </div>
        </form>

    </div>

</main>

<script th:if="${loginError}">
    showGlassAlert(
        "ورود ناموفق",
        "[[${loginError}]]"
    );
</script>

<script>
    function autoDirection(input) {
        input.addEventListener("input", function () {
            const value = this.value.trim();

            // Persian/Arabic Unicode range
            const persianRegex = /^[\u0600-\u06FF]/;

            if (persianRegex.test(value)) {
                this.dir = "rtl";
                this.style.textAlign = "right";
            } else {
                this.dir = "ltr";
                this.style.textAlign = "left";
            }
        });
    }

    // Apply to all text-like inputs
    document.querySelectorAll(
        'input[type="text"], input[type="email"], input[type="password"]'
    ).forEach(autoDirection);


    // Password toggle
    document.getElementById("toggle-password")
        .addEventListener("click", function () {
            const input = document.getElementById("login-password");
            const isHidden = input.type === "password";

            input.type = isHidden ? "text" : "password";

            this.setAttribute(
                "aria-label",
                isHidden ? "پنهان کردن رمز عبور" : "نمایش رمز عبور"
            );

            this.classList.toggle("is-visible", isHidden);
        });
    document.getElementById("toggle-password2")
        .addEventListener("click", function () {
            const input = document.getElementById("login-password2");
            const isHidden = input.type === "password";

            input.type = isHidden ? "text" : "password";

            this.setAttribute(
                "aria-label",
                isHidden ? "پنهان کردن رمز عبور" : "نمایش رمز عبور"
            );

            this.classList.toggle("is-visible", isHidden);
        });
</script>

</body>
</html>
