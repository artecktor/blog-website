<!DOCTYPE html>
<html lang="fa" dir="rtl"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود — درنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700&family=Vazirmatn:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/login-style.css">
</head>
<body>

<div class="page-loader" id="page-loader">
    <div class="page-loader-mark">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
    </div>
</div>

<div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
</div>

<main class="auth-wrap">

    <a href="http://localhost:8080" class="auth-logo">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
        درنگ
    </a>

    <div class="auth-card">

        <div class="auth-head">
            <h1 class="auth-title">خوش آمدید</h1>
            <p class="auth-sub">برای ادامه‌ی خواندن و نوشتن، وارد حساب خود شوید.</p>
        </div>

        <form class="auth-form" id="login-form" action="http://localhost:8080/login" method="post">

            <div class="form-field floating">
                <input id="login-email" name="email" type="email" placeholder=" " dir="ltr" required>
                <label for="login-email">ایمیل</label>
            </div>

            <div class="form-field">
                <div class="password-field floating">
                    <input id="login-password" name="password" type="password" placeholder=" " dir="ltr" required>
                    <label for="login-password">رمز عبور</label>
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="نمایش رمز عبور">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M2 12 C4.5 6.5 8 4 12 4 C16 4 19.5 6.5 22 12 C19.5 17.5 16 20 12 20 C8 20 4.5 17.5 2 12 Z"/>
                            <circle cx="12" cy="12" r="3.2"/>
                        </svg>
                    </button>
                </div>
                <a href="#" class="inline-link forgot-link">فراموش کرده‌اید؟</a>
            </div>

            <label class="checkbox-row">
                <input type="checkbox" name="remember">
                <span>مرا به خاطر بسپار</span>
            </label>

            <button class="btn-auth-primary" type="submit">ورود</button>

            <div class="divider"><span>یا ادامه با</span></div>

            <div class="oauth-row">
                <button type="button" class="btn-oauth" title="ورود با گوگل">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="#EA4335"
                              d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.9 1.5l2.6-2.5C16.9 3.3 14.7 2.3 12 2.3 6.9 2.3 2.8 6.4 2.8 11.6 S6.9 21 12 21c6.9 0 9.6-4.9 9.6-7.4 0-.5-.05-.9-.13-1.3H12Z"/>
                    </svg>
                    گوگل
                </button>
                <button type="button" class="btn-oauth" title="ورود با گیت‌هاب">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--ink)">
                        <path d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.3 6.8 9.6.5.1.7-.2.7-.5v-1.9c-2.8.6-3.4-1.4-3.4-1.4-.5-1.1-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.7.3-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.4.1-2.9 0 0 .8-.3 2.7 1 .8-.2 1.6-.3 2.5-.3s1.7.1 2.5.3c1.9-1.3 2.7-1 2.7-1 .5 1.5.2 2.6.1 2.9.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.6 5 .3.3.6.9.6 1.8v2.6c0 .3.2.6.7.5 3.9-1.3 6.8-5.1 6.8-9.6C22 6.6 17.5 2 12 2Z"/>
                    </svg>
                    گیت‌هاب
                </button>
            </div>
        </form>

        <p class="auth-switch">حساب کاربری ندارید؟ <a href="http://localhost:8080/register">ثبت‌نام کنید</a></p>

    </div>

</main>
<div class="glass-overlay" id="glass-alert-overlay">
    <div class="glass-alert" role="alertdialog" aria-modal="true" aria-labelledby="glass-alert-title">
        <button class="glass-alert-close" type="button" id="glass-alert-close" aria-label="بستن">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M5 5 L19 19 M19 5 L5 19"/>
            </svg>
        </button>
        <h3 class="glass-alert-title" id="glass-alert-title">عنوان</h3>
        <p class="glass-alert-text" id="glass-alert-text">متن پیام اینجا قرار می‌گیرد.</p>
        <button class="btn-auth-primary glass-alert-ok" type="button" id="glass-alert-ok">متوجه شدم</button>
    </div>
</div>

<script th:inline="javascript">
    // <!------------------------------------------------------>
    window.addEventListener("load", () => {
        const loader = document.getElementById("page-loader");
        const hasError = loginError !== null && loginError.trim() !== "";

        const revealLoginError = () => {
            if (hasError) {
                showGlassAlert("ورود ناموفق", loginError);
            }
        };

        const revealForm = () => {
            const fields = document.querySelectorAll(
                ".form-field, .checkbox-row, .btn-auth-primary, .divider, .oauth-row, .auth-switch"
            );
            fields.forEach((el, i) => {
                el.style.animationDelay = `${i * 60}ms`;
            });
            document.querySelector(".auth-card").parentElement.classList.add("form-ready");
        };

        if (hasError) {
            if (loader) {
                loader.style.transition = "none";
                loader.classList.add("is-hidden");
            }
            revealForm();
            revealLoginError();
            return;
        }

        if (loader) {
            setTimeout(() => {
                loader.classList.add("is-hidden");
                revealForm();
                setTimeout(revealLoginError, 500);
            }, 500);
        } else {
            revealForm();
            revealLoginError();
        }
    });

    document.getElementById("toggle-password")
        .addEventListener("click", function () {
            const input = document.getElementById("login-password");
            const isHidden = input.type === "password";

            input.type = isHidden ? "text" : "password";

            this.setAttribute(
                "aria-label",
                isHidden ? "پنهان کردن رمز عبور" : "نمایش رمز عبور"
            );

            this.classList.toggle("is-visible", isHidden);
        });


    function showGlassAlert(title, text) {
        const overlay = document.getElementById("glass-alert-overlay");

        document.getElementById("glass-alert-title").innerText = title;
        document.getElementById("glass-alert-text").innerText = text;

        overlay.classList.remove("is-open");
        void overlay.offsetWidth; // force a reflow so the browser "sees" the closed state

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                overlay.classList.add("is-open");
            });
        });

        document.body.style.overflow = "hidden";
    }

    function hideGlassAlert() {
        document.getElementById("glass-alert-overlay")
            .classList.remove("is-open");

        document.body.style.overflow = "";
    }

    document.getElementById("glass-alert-close")
        .addEventListener("click", hideGlassAlert);

    document.getElementById("glass-alert-ok")
        .addEventListener("click", hideGlassAlert);

    document.getElementById("glass-alert-overlay")
        .addEventListener("click", (e) => {
            if (e.target.id === "glass-alert-overlay") {
                hideGlassAlert();
            }
        });

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            hideGlassAlert();
        }
    });


    /* Login error from backend */
    let loginError = /*[[${loginError}]]*/ null;

</script>
</body>
</html>
