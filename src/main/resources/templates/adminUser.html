<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت کاربران — درنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700&family=Vazirmatn:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin-style.css">
    <!--    <link rel="stylesheet" href="/login-style.css">-->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem("derang-theme");
                var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (e) {
            }
        })();
    </script>
</head>
<body>

<div class="page-loader" id="page-loader">
    <div class="page-loader-mark">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
    </div>
</div>

<div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
</div>

<header class="site-header">
    <div class="header-inner admin-header-inner">
        <a href="http://localhost:8080/admin" class="logo">
            <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
            </svg>
            درنگ
            <span class="admin-badge">مدیریت</span>
        </a>

        <div class="header-right admin-header-actions">
            <button class="search-trigger" type="button" id="search-trigger" aria-label="جستجوی سریع">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                    <circle cx="11" cy="11" r="7"/>
                    <path d="M21 21l-4.3-4.3"/>
                </svg>
                <span class="search-trigger-label">جستجو</span>
                <kbd class="search-kbd">⌘K</kbd>
            </button>

            <button class="theme-toggle" type="button" id="theme-toggle" aria-label="تغییر پوسته">
                <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.7">
                    <circle cx="12" cy="12" r="4.2"/>
                    <path d="M12 2.5v2.6M12 18.9v2.6M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M2.5 12h2.6M18.9 12h2.6M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"/>
                </svg>
                <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.7">
                    <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z"/>
                </svg>
            </button>

            <a href="http://localhost:8080" class="admin-exit-link">
                <span>بازگشت به سایت</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M15 5 L8 12 L15 19"/>
                </svg>
            </a>
        </div>
    </div>
</header>

<main>

    <section class="admin-hero reveal">
        <p class="eyebrow">پنل مدیریت درنگ</p>
        <h1 class="admin-title">مدیریت کاربران</h1>
        <p class="admin-sub">حساب‌های کاربری، دسترسی‌ها و وضعیت اعضای سایت را مدیریت کنید.</p>
    </section>

    <section class="comments-toolbar reveal">
        <div class="filter-group">
            <button onclick="loadUsers(1)" id="users-all" class="filter-pill is-active" data-filter="all">
                همه <span class="filter-pill-count" id="count-all">۰</span>
            </button>
            <button onclick="loadUsers(2)" id="users-normal" class="filter-pill" data-filter="user">
                کاربران عادی <span class="filter-pill-count" id="count-user">۰</span>
            </button>
            <button onclick="loadUsers(3)" id="users-admin" class="filter-pill" data-filter="admin">
                مدیران <span class="filter-pill-count" id="count-admin">۰</span>
            </button>
        </div>

        <button class="btn btn-primary" type="button" aria-disabled="true" title="ثبت نام" onclick="window.location.href='http://localhost:8080/register'">
            ساخت حساب کاربری
        </button>
    </section>

    <section class="comments-wrap reveal">
        <div class="comments-table-shell">

            <div class="comments-skeleton" id="users-skeleton" style="display:none;">
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>

            <div class="comments-table-scroll" id="table-scroll">
                <table class="comments-table">
                    <thead>
                    <tr>
                        <th class="col-check"><input type="checkbox" class="select-all-check" id="select-all"></th>
                        <th class="col-author" style="padding-right:24px;">کاربر</th>
                        <th class="col-comment">ایمیل</th>
                        <th class="col-post">آدرس</th>
                        <th class="col-status">نقش</th>
                        <th class="col-actions">عملیات</th>
                    </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>

            <div class="comments-empty" id="users-empty" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
                    <circle cx="9" cy="8.5" r="3"/>
                    <path d="M3.5 19 c0 -3.3 2.5 -5.5 5.5 -5.5 s5.5 2.2 5.5 5.5"/>
                    <circle cx="17" cy="8.5" r="2.4"/>
                    <path d="M15.7 13.7 c2.4 0.3 4.3 2.3 4.3 5.3"/>
                </svg>
                <p>کاربری برای نمایش وجود ندارد.</p>
            </div>

        </div>
    </section>

</main>

<div class="cmdk-overlay" id="cmdk-overlay">
    <div class="cmdk-panel" role="dialog" aria-modal="true" aria-label="جستجوی سریع">
        <div class="cmdk-input-wrap">
            <svg class="cmdk-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                <circle cx="11" cy="11" r="7"/>
                <path d="M21 21l-4.3-4.3"/>
            </svg>
            <input type="text" id="cmdk-input" class="cmdk-input" placeholder="جستجو در بخش‌های مدیریت…"
                   autocomplete="off">
            <kbd class="cmdk-esc">Esc</kbd>
        </div>
        <div class="cmdk-list" id="cmdk-list"></div>
    </div>
</div>

<div class="glass-overlay" id="glass-alert-overlay">
    <div class="glass-alert">
        <button class="glass-alert-close" type="button" id="glass-alert-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M5 5 L19 19 M19 5 L5 19"/>
            </svg>
        </button>

        <h3 class="glass-alert-title" id="glass-alert-title"></h3>
        <p class="glass-alert-text" id="glass-alert-text"></p>

        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-primary" id="confirm-delete-btn">حذف</button>
            <button class="bulk-btn clear" id="cancel-delete-btn">انصراف</button>
        </div>
    </div>
</div>

<footer class="site-footer admin-footer">
    <div class="footer-bottom admin-footer-bottom">
        <div class="admin-footer-brand">
            <svg class="logo-mark small" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
            </svg>
            <span>پنل مدیریت درنگ</span>
        </div>
        <p>© ۱۴۰۵ درنگ. دسترسی محدود به مدیران سایت.</p>
    </div>
</footer>

<script>
    let targetId = new URLSearchParams(window.location.search).get("targetId");

    async function loadUsers(phase) {
        document.getElementById("users-tbody").innerHTML = "";
        const allUsers = await fetch("http://localhost:8080/users").then(res => res.json());

        updateUserCounts(allUsers);

        let desiredUsers = [];
        switch (phase) {
            case 1:
                document.getElementById("users-all").classList.add("is-active");
                document.getElementById("users-normal").classList.remove("is-active");
                document.getElementById("users-admin").classList.remove("is-active");
                desiredUsers = allUsers;
                break;
            case 2:
                document.getElementById("users-all").classList.remove("is-active");
                document.getElementById("users-normal").classList.add("is-active");
                document.getElementById("users-admin").classList.remove("is-active");
                desiredUsers = allUsers.filter(u => u.role !== "ADMIN");
                break;
            case 3:
                document.getElementById("users-all").classList.remove("is-active");
                document.getElementById("users-normal").classList.remove("is-active");
                document.getElementById("users-admin").classList.add("is-active");
                desiredUsers = allUsers.filter(u => u.role === "ADMIN");
                break;
        }
        document.getElementById("users-empty").style.display =
            desiredUsers.length ? "none" : "block";

        desiredUsers.forEach((user, i) => convertToHTML(user, i));
        highlightTargetRow();
    }
    function highlightTargetRow() {
        if (!targetId) return;

        const row = document.querySelector(`tr[data-id="${targetId}"]`);
        if (!row) return; // target user not in current filter (e.g. deleted, or wrong tab)

        // restart animation cleanly even if called again (e.g. after role toggle)
        row.classList.remove("is-target");
        void row.offsetWidth; // force reflow so the animation replays
        row.classList.add("is-target");

        row.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function updateUserCounts(users) {
        document.getElementById("count-all").innerText = users.length.toLocaleString("fa-IR");
        document.getElementById("count-user").innerText =
            users.filter(u => u.role !== "ADMIN").length.toLocaleString("fa-IR");
        document.getElementById("count-admin").innerText =
            users.filter(u => u.role === "ADMIN").length.toLocaleString("fa-IR");
    }

    function convertToHTML(user, index = 0) {
        const isAdmin = user.role === "ADMIN";
        let row = `
    <tr class="row-enter" data-id="${user.id}" style="animation-delay:${index * 40}ms">
        <td class="col-check"><input type="checkbox" class="row-check" data-id="${user.id}"></td>
        <td class="cell-author-td">
            <div class="cell-author">
                <span class="author-avatar">${user.username[0].toUpperCase()}</span>
                <a class="author-name">${user.username}</a>
            </div>
        </td>
        <td class="cell-comment">${user.email}</td>
        <td class="cell-post">${user.address ?? '—'}</td>
        <td class="cell-status">
            <span class="status-badge ${isAdmin ? 'accepted' : 'pending'}">${isAdmin ? 'مدیر' : 'کاربر عادی'}</span>
        </td>
        <td class="col-actions">
            <div class="row-actions">
                <label class="ios-switch">
                    <input
                        type="checkbox"
                        ${isAdmin ? "checked" : ""}
                        onchange="toggleRole(${user.id}, ${isAdmin})"
                    >
                    <span class="slider"></span>
                </label>
                <button onclick="showDeleteAlert(${user.id})" class="comment-action-btn delete-btn" title="حذف کاربر">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 7h14 M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2 M7 7l1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13 M10 11v6 M14 11v6"/>
                    </svg>
                </button>
            </div>
        </td>
    </tr>
    `;
        document.getElementById("users-tbody").innerHTML += row;
    }

    document.getElementById("select-all").addEventListener("change", (e) => {
        document.querySelectorAll(".row-check").forEach(cb => {
            cb.checked = e.target.checked;
        });
    });

    async function toggleRole(userId, isCurrentlyAdmin) {
        const endpoint = isCurrentlyAdmin
            ? "http://localhost:8080/users/demote/" + userId
            : "http://localhost:8080/users/promote/" + userId;

        await fetch(endpoint);
        await loadUsers(1);
    }

    let pendingDeleteId = null;

    function showDeleteAlert(userId) {
        pendingDeleteId = userId;

        document.getElementById("glass-alert-title").innerText = "حذف کاربر";
        document.getElementById("glass-alert-text").innerText =
            "آیا مطمئن هستید که می‌خواهید این کاربر را حذف کنید؟";

        document.getElementById("glass-alert-overlay").classList.add("is-open");
    }

    function hideGlassAlert() {
        document.getElementById("glass-alert-overlay").classList.remove("is-open");
        pendingDeleteId = null;
    }

    document.getElementById("cancel-delete-btn").addEventListener("click", hideGlassAlert);
    document.getElementById("glass-alert-close").addEventListener("click", hideGlassAlert);

    document.getElementById("confirm-delete-btn").addEventListener("click", async () => {
        if (!pendingDeleteId) return;

        await fetch("http://localhost:8080/users/delete/" + pendingDeleteId, {method: "GET"});

        hideGlassAlert();
        await loadUsers(1);
    });

    window.addEventListener("load", () => {
        const loader = document.getElementById("page-loader");
        const revealNow = () => {
            document.querySelectorAll(".reveal").forEach((el, i) => {
                const delay = i * 70;
                el.style.transitionDelay = `${delay}ms`;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => el.classList.add("visible"));
                });
                setTimeout(() => {
                    el.style.transitionDelay = "";
                }, delay + 850);
            });
        };
        if (loader) {
            setTimeout(() => {
                loader.classList.add("is-hidden");
                revealNow();
            }, 450);
        } else {
            revealNow();
        }
    });

    loadUsers(1);
</script>

<script>
    /* ---------- Theme toggle (same behavior as the main site) ---------- */
    const themeToggle = document.getElementById("theme-toggle");
    const rootEl = document.documentElement;

    function applyTheme(theme) {
        rootEl.setAttribute("data-theme", theme);
        try {
            localStorage.setItem("derang-theme", theme);
        } catch (e) {
        }
    }

    if (themeToggle) {
        themeToggle.addEventListener("click", () => {
            const next = rootEl.getAttribute("data-theme") === "dark" ? "light" : "dark";
            applyTheme(next);
        });
    }

    /* ---------- Command palette (⌘K), scoped to admin sections ---------- */
    const cmdkData = [
        {title: "پنل مدیریت", sub: "بازگشت به صفحه اصلی مدیریت", href: "http://localhost:8080/admin", external: true},
        {title: "بلاگها", sub: "نوشتن، ویرایش و انتشار بلاگها", href: "http://localhost:8080/admin/blogs", external: true},
        {title: "کاربران", sub: "حساب‌های کاربری و دسترسی‌ها", href: "http://localhost:8080/admin/users", external: true},
        {title: "دیدگاه‌ها", sub: "بررسی، تأیید یا حذف دیدگاه‌ها", href: "http://localhost:8080/admin/comments", external: true},
        {title: "بازگشت به سایت", sub: "خروج از پنل مدیریت", href: "http://localhost:8080", external: true}
    ];

    const cmdkOverlay = document.getElementById("cmdk-overlay");
    const cmdkInput = document.getElementById("cmdk-input");
    const cmdkList = document.getElementById("cmdk-list");
    let cmdkActiveIndex = 0;
    let cmdkFiltered = cmdkData;

    function renderCmdk() {
        if (!cmdkFiltered.length) {
            cmdkList.innerHTML = `<p class="cmdk-empty">نتیجه‌ای پیدا نشد.</p>`;
            return;
        }
        cmdkList.innerHTML = cmdkFiltered.map((item, i) => `
            <div class="cmdk-item ${i === cmdkActiveIndex ? "is-active" : ""}" data-index="${i}">
                <svg class="cmdk-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                    <circle cx="12" cy="12" r="9"/>
                </svg>
                <div class="cmdk-item-text">
                    <span class="cmdk-item-title">${item.title}</span>
                    <span class="cmdk-item-sub">${item.sub}</span>
                </div>
            </div>
        `).join("");

        cmdkList.querySelectorAll(".cmdk-item").forEach((el) => {
            const i = parseInt(el.dataset.index, 10);
            el.addEventListener("click", () => goToCmdkItem(cmdkFiltered[i]));
            el.addEventListener("mousemove", () => {
                if (cmdkActiveIndex !== i) {
                    cmdkActiveIndex = i;
                    renderCmdk();
                }
            });
        });
    }

    function goToCmdkItem(item) {
        closeCmdk();
        if (item.external) {
            window.location.href = item.href;
            return;
        }
        const target = document.querySelector(item.href);
        if (target) target.scrollIntoView({behavior: "smooth", block: "start"});
    }

    function openCmdk() {
        cmdkOverlay.classList.add("is-open");
        document.body.style.overflow = "hidden";
        cmdkInput.value = "";
        cmdkFiltered = cmdkData;
        cmdkActiveIndex = 0;
        renderCmdk();
        setTimeout(() => cmdkInput.focus(), 50);
    }

    function closeCmdk() {
        cmdkOverlay.classList.remove("is-open");
        document.body.style.overflow = "";
    }

    if (cmdkInput) {
        cmdkInput.addEventListener("input", () => {
            const q = cmdkInput.value.trim().toLowerCase();
            cmdkFiltered = cmdkData.filter(item =>
                item.title.toLowerCase().includes(q) || item.sub.toLowerCase().includes(q)
            );
            cmdkActiveIndex = 0;
            renderCmdk();
        });

        cmdkInput.addEventListener("keydown", (e) => {
            if (e.key === "ArrowDown") {
                e.preventDefault();
                cmdkActiveIndex = Math.min(cmdkActiveIndex + 1, cmdkFiltered.length - 1);
                renderCmdk();
            } else if (e.key === "ArrowUp") {
                e.preventDefault();
                cmdkActiveIndex = Math.max(cmdkActiveIndex - 1, 0);
                renderCmdk();
            } else if (e.key === "Enter") {
                e.preventDefault();
                if (cmdkFiltered[cmdkActiveIndex]) goToCmdkItem(cmdkFiltered[cmdkActiveIndex]);
            }
        });
    }

    const searchTrigger = document.getElementById("search-trigger");
    if (searchTrigger) searchTrigger.addEventListener("click", openCmdk);

    if (cmdkOverlay) {
        cmdkOverlay.addEventListener("click", (e) => {
            if (e.target === cmdkOverlay) closeCmdk();
        });
    }

    document.addEventListener("keydown", (e) => {
        const isK = e.key.toLowerCase() === "k";
        if ((e.metaKey || e.ctrlKey) && isK) {
            e.preventDefault();
            if (cmdkOverlay.classList.contains("is-open")) {
                closeCmdk();
            } else {
                openCmdk();
            }
        }
        if (e.key === "Escape" && cmdkOverlay.classList.contains("is-open")) closeCmdk();
    });
</script>

</body>
</html>
