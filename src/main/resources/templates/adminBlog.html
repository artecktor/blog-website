<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت بلاگ‌ها — درنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;600;700&family=Vazirmatn:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin-style.css">
    <link rel="stylesheet" href="/login-style.css">
</head>
<body>

<div class="page-loader" id="page-loader">
    <div class="page-loader-mark">
        <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
        </svg>
    </div>
</div>

<div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
</div>

<header class="site-header">
    <div class="header-inner admin-header-inner">
        <a href="http://localhost:8080/admin" class="logo">
            <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
            </svg>
            درنگ
            <span class="admin-badge">مدیریت</span>
        </a>

        <a href="http://localhost:8080" class="admin-exit-link">
            <span>بازگشت به سایت</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M15 5 L8 12 L15 19"/>
            </svg>
        </a>
    </div>
</header>

<main>

    <section class="admin-hero reveal">
        <p class="eyebrow">پنل مدیریت درنگ</p>
        <h1 class="admin-title">مدیریت بلاگ‌ها</h1>
        <p class="admin-sub">نوشته‌های وبلاگ را اضافه، ویرایش یا حذف کنید.</p>
    </section>

    <section class="comments-toolbar reveal">
        <div class="filter-group">
            <button class="filter-pill is-active" type="button">
                همه <span class="filter-pill-count" id="count-all">۰</span>
            </button>
        </div>

        <button class="btn btn-primary" type="button" id="add-blog-btn">
            بلاگ جدید
        </button>
    </section>

    <section class="comments-wrap reveal">
        <div class="comments-table-shell">

            <div class="comments-skeleton" id="blogs-skeleton" style="display:none;">
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>

            <div class="comments-table-scroll" id="table-scroll">
                <table class="comments-table">
                    <thead>
                    <tr>
                        <th class="col-author" style="padding-right:24px;">بلاگ</th>
                        <!--                        <th class="col-comment">توضیحات</th>-->
                        <th class="col-post">توضیحات</th>
                        <th class="col-status">نویسنده</th>
                        <th class="col-actions">مدت مطالعه</th>
                    </tr>
                    </thead>
                    <tbody id="blogs-tbody"></tbody>
                </table>
            </div>

            <div class="comments-empty" id="blogs-empty" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
                    <path d="M4 4h16v16H4z"/>
                    <path d="M8 9h8M8 13h5"/>
                </svg>
                <p>هنوز بلاگی ثبت نشده است.</p>
            </div>

        </div>
    </section>

</main>

<div class="glass-overlay" id="glass-alert-overlay">
    <div class="glass-alert">
        <button class="glass-alert-close" type="button" id="glass-alert-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M5 5 L19 19 M19 5 L5 19"/>
            </svg>
        </button>

        <h3 class="glass-alert-title" id="glass-alert-title"></h3>
        <p class="glass-alert-text" id="glass-alert-text"></p>

        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-primary" id="confirm-delete-btn">حذف</button>
            <button class="bulk-btn clear" id="cancel-delete-btn">انصراف</button>
        </div>
    </div>
</div>

<footer class="site-footer admin-footer">
    <div class="footer-bottom admin-footer-bottom">
        <div class="admin-footer-brand">
            <svg class="logo-mark small" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 1.5 C12.6 7.8 14.2 9.4 20.5 10 C14.2 10.6 12.6 12.2 12 18.5 C11.4 12.2 9.8 10.6 3.5 10 C9.8 9.4 11.4 7.8 12 1.5 Z"/>
            </svg>
            <span>پنل مدیریت درنگ</span>
        </div>
        <p>© ۱۴۰۵ درنگ. دسترسی محدود به مدیران سایت.</p>
    </div>
</footer>

<script>
    let targetId = new URLSearchParams(window.location.search).get("targetId");
    document.getElementById("add-blog-btn").addEventListener("click", () => {
        window.location.href = "http://localhost:8080/admin/blog-edit";
    });

    async function loadBlogs() {
        document.getElementById("blogs-tbody").innerHTML = "";
        const blogs = await fetch("http://localhost:8080/blogs").then(res => res.json());

        document.getElementById("count-all").innerText = blogs.length.toLocaleString("fa-IR");
        document.getElementById("blogs-empty").style.display = blogs.length ? "none" : "block";

        blogs.forEach((blog, i) => convertToHTML(blog, i));
        highlightTargetRow();
    }

    function convertToHTML(blog, index = 0) {
        const readingTime = Math.ceil(blog.content.length / 1200).toLocaleString("fa-IR");
        let row = `
    <tr class="row-enter" data-id="${blog.id}" style="animation-delay:${index * 40}ms">
        <td class="cell-author-td">
            <div class="cell-author">
                <span class="author-avatar" style="border-radius:8px;overflow:hidden;">
                    <img src="${blog.imageAddress}" alt="" style="width:100%;height:100%;object-fit:cover;">
                </span>
                <a href="http://localhost:8080/admin/blog-edit?id=${blog.id}" class="author-name link-underline">${blog.title}</a>
            </div>
        </td>
        <td class="cell-comment">
            <p class="comment-text-cell">${blog.description}</p>
        </td>
        <td class="cell-post">${blog.author}</td>
        <td class="cell-status">
            <span class="status-badge accepted">${readingTime} دقیقه</span>
        </td>
        <td class="col-actions">
            <div class="row-actions">
                <button onclick="window.location.href='http://localhost:8080/admin/blog-edit?id=${blog.id}'" class="comment-action-btn accept-btn" title="ویرایش">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
                    </svg>
                </button>
                <button onclick="showDeleteAlert(${blog.id})" class="comment-action-btn delete-btn" title="حذف">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 7h14 M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2 M7 7l1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13 M10 11v6 M14 11v6"/>
                    </svg>
                </button>
            </div>
        </td>
    </tr>
    `;
        document.getElementById("blogs-tbody").innerHTML += row;
    }

    let pendingDeleteId = null;

    function showDeleteAlert(blogId) {
        pendingDeleteId = blogId;
        document.getElementById("glass-alert-title").innerText = "حذف بلاگ";
        document.getElementById("glass-alert-text").innerText =
            "آیا مطمئن هستید که می‌خواهید این بلاگ را حذف کنید؟ این عمل قابل بازگشت نیست.";
        document.getElementById("glass-alert-overlay").classList.add("is-open");
    }

    function hideGlassAlert() {
        document.getElementById("glass-alert-overlay").classList.remove("is-open");
        pendingDeleteId = null;
    }

    document.getElementById("cancel-delete-btn").addEventListener("click", hideGlassAlert);
    document.getElementById("glass-alert-close").addEventListener("click", hideGlassAlert);

    document.getElementById("confirm-delete-btn").addEventListener("click", async () => {
        if (!pendingDeleteId) return;
        await fetch("http://localhost:8080/blogs/delete/" + pendingDeleteId, {method: "GET"});
        hideGlassAlert();
        await loadBlogs();
    });

    function highlightTargetRow() {
        if (!targetId) return;

        const row = document.querySelector(`tr[data-id="${targetId}"]`);
        if (!row) return; // target user not in current filter (e.g. deleted, or wrong tab)

        // restart animation cleanly even if called again (e.g. after role toggle)
        row.classList.remove("is-target");
        void row.offsetWidth; // force reflow so the animation replays
        row.classList.add("is-target");

        row.scrollIntoView({behavior: "smooth", block: "center"});
    }

    window.addEventListener("load", () => {
        const loader = document.getElementById("page-loader");
        const revealNow = () => {
            document.querySelectorAll(".reveal").forEach((el, i) => {
                const delay = i * 70;
                el.style.transitionDelay = `${delay}ms`;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => el.classList.add("visible"));
                });
                setTimeout(() => {
                    el.style.transitionDelay = "";
                }, delay + 850);
            });
        };
        if (loader) {
            setTimeout(() => {
                loader.classList.add("is-hidden");
                revealNow();
            }, 450);
        } else {
            revealNow();
        }
    });

    loadBlogs();
</script>

</body>
</html>
