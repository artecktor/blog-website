<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title id="websiteTitle">Book Detail</title>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top p-4">
    <div class="container px-4">
        <a class="navbar-brand vazirBoldFont fs-4" href="http://localhost:8080">کتابفروشی کتابستان</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navbarSupportedContent" class="navbar-collapse pt-4 mt-2 m-lg-0 p-lg-0 collapse rounded bg-dark">
            <ul style="font-size: larger" class="navbar-nav ms-lg-auto mb-2 mb-lg-0 align-items-center text-center">
                <li class="nav-item me-lg-5 d-flex justify-content-lg-start justify-content-center">
                    <a href="http://localhost:8080/login" style="text-decoration: none" class="cart-btn-3">عضویت | ورود</a>
                </li>
                <li class="nav-item m-1">
                    <a class="nav-link active" aria-current="page" href="http://localhost:8080">خانه</a>
                </li>
                <li class="nav-item m-1"><a class="nav-link" href="http://localhost:8080/blog-list">کتاب ها</a></li>
                <li class="nav-item m-1"><a class="nav-link" href="#">درباره ما</a></li>
                <li class="nav-item m-1"><a class="nav-link" href="#">تماس با ما</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4 my-md-5">
    <header class="py-3 py-md-5">
        <div class="container" style="max-width: 1100px;">
            <div class="row gx-4 align-items-center justify-content-center blog-layout">
                <div class="col-12 col-md-7 order-2 order-md-1">
                    <div class="my-3 my-md-5 text-center text-xl-start">
                        <h1 id="title" class="display-6 display-md-5 fw-bolder mb-4 text-center text-xl-start" style="color: darkred">
                            موضوع کتاب
                        </h1>
                        <p class="lead mb-3 text-center text-xl-start">
                            <span>نویسنده: </span>
                            <span id="author" style="color:#7A7A7A">ناشناخته</span>
                        </p>
                        <p class="lead mb-3 text-center text-xl-start">
                            <span id="bookRatingIndex"></span>
                            <span id="bookRating"></span>
                            <span style="color:darkslategray" class="fa fa-star"></span>
                        </p>
                        <p class="lead mb-4 text-center text-xl-start">
                            <span>قیمت: </span>
                            <span id="price" style="color:#7A7A7A">120</span>
                            <span> تومان</span>
                        </p>
                        <div class="d-flex justify-content-center justify-content-xl-start">
                            <div class="btn cart-btn-2 d-block d-md-inline-block px-4">
                                افزودن به سبد خرید
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-5 order-1 order-md-2 text-center">
                    <img id="imageAddress" class="img-fluid rounded-3 my-3 my-md-5 shadow" style="max-height: 520px; object-fit: contain;" src="" alt="">
                </div>
            </div>
        </div>
    </header>

    <div class="card p-3 border-0 shadow" style="margin: 10px; direction: rtl; background-color: white">
        <h1 style="color: darkred" class="p-3 vazirBoldFont">توضیحات کتاب</h1>
        <div>
            <h6 id="description" class="p-5"></h6>
        </div>
    </div>

    <div class="card p-3 border-0 shadow" style="margin: 40px 10px 10px; direction: rtl; background-color: white">
        <div class="d-flex justify-content-between align-items-center">
            <h1 style="color: darkred" class="p-3 vazirBoldFont">نظرات کاربران</h1>
            <button type="button" data-bs-toggle="modal" data-bs-target="#exampleModal" class="btn cart-btn-2 ms-md-5">
                ثبت نظر
            </button>
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="d-flex align-items-center justify-content-between pt-3 px-4">
                            <h1 class="modal-title fs-5 vazirBoldFont" id="exampleModalLabel">ثبت نظر</h1>
                            <button onclick="clearModal()" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <hr class="mb-5">
                        <div class="modal-body">
                            <div class="mb-5 floating-group">
                                <input id="username" type="text" name="username" class="form-control form-btn p-3" placeholder="نام کاربر" required>
                                <label class="form-label">نام کاربر</label>
                            </div>
                            <div class="mb-2 floating-group">
                                <input id="password" type="password" name="password" class="form-control form-btn p-3" placeholder="پسورد" required>
                                <label class="form-label">پسورد</label>
                            </div>
                            <div class="text-center mb-5">
                                <a href="http://localhost:8080/register">ثبت نام نکرده ام</a>
                            </div>
                            <div class="mb-5 floating-group">
                                <textarea id="text" type="text" name="text" class="form-control form-btn p-3" placeholder="متن" required></textarea>
                                <label class="form-label">متن</label>
                            </div>
                            <h3 class="vazirBoldFont text-center">امتیاز شما</h3>
                            <div style="direction: ltr" class="d-flex justify-content-center align-items-center mb-2">
                                <span class="fa fa-star star"></span>
                                <span class="fa fa-star star"></span>
                                <span class="fa fa-star star"></span>
                                <span class="fa fa-star star"></span>
                                <span class="fa fa-star star"></span>
                            </div>
                            <h3 id="currentCommentRating" class="text-center">۰ از ۵</h3>
                            <input type="text" id="id" name="id" hidden>
                            <input type="number" id="rating" name="rating" hidden>
                            <input type="text" id="bookId" name="bookId" hidden>
                            <input type="text" id="userId" name="userId" hidden>
                            <button onclick="submitComment()" style="border-radius: 30px; width: 100%; margin-top: 45px" class="btn btn-submit p-2 d-flex justify-content-center align-items-center" type="submit">
                                <i class="fa fa-level-down btn-submit-arrow"></i>ثبت نظر
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="commentSection" class="p-md-5 pb-3"></div>
    </div>
</div>

<footer class="py-5 bg-dark">
    <div class="container px-5">
        <p class="m-0 text-center text-white">کتابفروشی برتر - تمام حقوق محفوظ است ©</p>
    </div>
</footer>

<script>
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id");
    const allStars = document.querySelectorAll('.star');
    let currentRating = document.querySelector('#currentCommentRating');

    allStars.forEach((star, i) => {
        star.onclick = function () {
            let currentStarLevel = i + 1;
            currentRating.innerText = `${currentStarLevel.toLocaleString("fa-IR")} از ۵`;
            document.getElementById("rating").value = currentStarLevel;
            allStars.forEach((star, j) => {
                if (currentStarLevel >= j + 1) {
                    star.classList.add('checked');
                } else {
                    star.classList.remove('checked');
                }
            });
        };
    });

    function getBookDetail() {
        fetch("http://localhost:8080/books/" + bookId)
            .then(res => res.json())
            .then(blog => {
                document.getElementById("websiteTitle").innerText = "کتاب " + blog.title;
                document.getElementById("title").innerText = blog.title;
                document.getElementById("author").innerText = blog.author;
                document.getElementById("description").innerText = blog.description;
                document.getElementById("price").innerText = blog.price.toLocaleString("fa-IR");
                document.getElementById("imageAddress").src = blog.imageAddress;
                getAverageRating(blog).then(data => {
                    if (data.averageRating != null && !isNaN(data.averageRating)) {
                        document.getElementById("bookRating").innerText = Number(data.averageRating.toFixed(1)).toLocaleString("fa-IR");
                        document.getElementById("bookRatingIndex").innerText = "(" + data.index.toLocaleString("fa-IR") + ")";
                    } else {
                        document.getElementById("bookRating").innerText = "(نظری ثبت نشده)";
                    }
                });
            });
    }

    function loadStars(rating) {
        let stars = "";
        for (let i = 5; i >= 1; i--) {
            stars += i <= rating ? "<span class='fa fa-star checked'></span>" : "<span class='fa fa-star'></span>";
        }
        return stars;
    }

    function getComments() {
        fetch("http://localhost:8080/comments/blog/" + bookId + "/sorted")
            .then(res => res.json())
            .then(comments => {
                const commentPromises = comments.map(async c => {
                    const userRes = await fetch("http://localhost:8080/users/" + c.userId);
                    const user = await userRes.json();
                    const date = new Date(c.updatedAt);
                    const persianFormatter = new Intl.DateTimeFormat('fa-IR-u-ca-persian', {
                        timeZone: 'Asia/Tehran',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    });
                    const formattedDate = persianFormatter.format(date);
                    return `<div class="comment">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;">
                            <h3 style="margin: 0; font-size: larger; font-weight: bold">-${user.username}-</h3>
                            <span style="direction: ltr; font-size: 0.85rem; color: gray;">${formattedDate}</span>
                        </div>
                        <div><span style="direction: ltr" id="star-rating">${loadStars(c.rating)}</span></div>
                        <h6 class="pt-3" style="margin-top: 0;">${c.text}</h6>
                    </div>`;
                });
                Promise.all(commentPromises).then(html => {
                    document.getElementById("commentSection").innerHTML = html.join("");
                });
            });
    }

    function getAverageRating(blog) {
        return fetch("http://localhost:8080/comments/blog/" + blog.id)
            .then(res => res.json())
            .then(comments => {
                let rating = 0;
                let index = 0;
                for (let i = 0; i < comments.length; i++) {
                    if (comments[i].accepted) {
                        rating += comments[i].rating;
                        index++;
                    }
                }
                if (index === 0) return 0;
                return {averageRating: rating / index, index};
            });
    }

    getBookDetail();
    getComments();

    async function loginWithoutChangingBackend() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const usersRes = await fetch("http://localhost:8080/users");
        const users = await usersRes.json();
        const user = users.find(u => u.username === username && u.password === password);
        if (!user) {
            alert("نام کاربری یا رمز عبور صحیح وارد نشده");
            return null;
        }
        document.getElementById("userId").value = user.id;
        document.getElementById("bookId").value = bookId;
        return user.id;
    }

    async function submitComment() {
        const userId = await loginWithoutChangingBackend();
        if (!userId) return;
        const data = {
            text: document.getElementById("text").value,
            rating: document.getElementById("rating").value,
            bookId: bookId,
            userId: userId
        };
        const res = await fetch("http://localhost:8080/comments", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
        if (res.ok) {
            alert("نظر شما با موفقیت ثبت شد. بعد از پذیرفته شدن توسط ادمین، قابل مشاهده خواهد گرفت.");
            clearModal();
            const modalEl = document.getElementById('exampleModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
        }
    }

    function clearModal() {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("text").value = "";
        document.getElementById("rating").value = "";
        document.getElementById("userId").value = "";
        document.getElementById("bookId").value = "";
        document.querySelectorAll('.star').forEach(star => { star.classList.remove('checked'); });
        document.getElementById("currentCommentRating").innerText = "۰ از ۵";
    }
</script>

<script src="/bootstrap.bundle.min.js"></script>
</body>
</html>
